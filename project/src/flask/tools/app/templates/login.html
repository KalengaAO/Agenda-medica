{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="login-box">

<h2>Entrar</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="{{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}


<form method="POST">

<label>
Usuário
</label>

<input 
    type="text"
    name="username"
>


<label>
Senha
</label>

<input 
    type="password"
    name="password"
>


<button type="submit">
Entrar
</button>


</form>

</div>

{% endblock %}
