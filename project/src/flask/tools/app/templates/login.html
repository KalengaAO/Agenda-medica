{% extends "base.html" %}


{% block title %}
Login
{% endblock %}



{% block content %}

<div class="login-box">

<h2>Entrar</h2>


<form method="POST">

<label>
Usuário
</label>

<input 
    type="text"
    name="username"
>


<label>
Senha
</label>

<input 
    type="password"
    name="password"
>


<button type="submit">
Entrar
</button>


</form>

</div>


{% endblock %}
