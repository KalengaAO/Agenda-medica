
services:

  api:
    build: ./api
    container_name: api
    restart: always
    env_file:
      - .env
    ports:
      - "5001:5001"
    networks:
      - agenda-network

  flask:
    build: ./flask
    container_name: flask
    restart: always
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "5000:5000"
    networks:
      - agenda-network

networks:
  agenda-network: