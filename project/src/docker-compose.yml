name: agenda-medica

services:

  mariadb:
    build: ./mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - agenda-medica

 
volumes:
  mariadb-data:
     driver: local
     driver_opts:
      type: none
      o: bind
      device: /home/interview/mariadb

networks:
  agenda-medica: